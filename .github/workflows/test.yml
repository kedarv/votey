name: pytest

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
    - name: Set up Python 3.14
      run: uv python install 3.14
    - run: uv sync --frozen --all-groups
    - run: uv run pytest
